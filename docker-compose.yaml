services:
  postgres:
    image: postgres:16
    container_name: lamprey-postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lamprey
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
