<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>TITLE</title>
		<style>
			:root {
				--font-default:
					"Atkinson Hyperlegible", Inter, system-ui, Avenir, Helvetica, Arial,
					sans-serif;
				--font-mono: "Iosevka Zesty", "Courier New", Courier, monospace;
				/* Dark theme colors from theme.scss (OKLCH format) */
				--color-fg-100: oklch(100% 0 0);
				--color-fg-300: oklch(89.8% 0 0);
				--color-fg-400: oklch(84.5% 0 0);
				--color-fg-500: oklch(73.8% 0 0);
				--color-bg-100: oklch(17% 0.008 229.4);
				--color-bg-200: oklch(22.3% 0.01 234.2);
				--color-bg-300: oklch(27.5% 0.011 225.5);
				--color-sep: oklch(37.3% 0.016 208.8);
				--color-link: oklch(71.6% 0.15 299.2);
				--color-link-dim: oklch(61.6% 0.15 299.2);
			}
			* {
				box-sizing: border-box;
			}
			body {
				font-family: var(--font-default);
				line-height: 1.6;
				max-width: 800px;
				margin: 0 auto;
				padding: 2rem;
				color: var(--color-fg-100);
				background: var(--color-bg-100);
			}
			h1, h2, h3, h4, h5, h6 {
				margin-top: 1.5em;
				margin-bottom: 0.5em;
				font-weight: 600;
				line-height: 1.25;
			}
			h1 {
				font-size: 2em;
				border-bottom: 1px solid var(--color-sep);
				padding-bottom: 0.3em;
			}
			h2 {
				font-size: 1.5em;
				border-bottom: 1px solid var(--color-sep);
				padding-bottom: 0.3em;
			}
			h3 {
				font-size: 1.25em;
			}
			h4 {
				font-size: 1em;
			}
			h5 {
				font-size: 0.875em;
			}
			h6 {
				font-size: 0.85em;
				color: var(--color-fg-500);
			}
			p {
				margin: 1em 0;
			}
			a {
				color: var(--color-link);
				text-decoration: none;
			}
			a:hover {
				text-decoration: underline;
			}
			code {
				background: var(--color-bg-200);
				padding: 0.2em 0.4em;
				border-radius: 3px;
				font-family: var(--font-mono);
				font-size: 85%;
			}
			pre {
				background: var(--color-bg-200);
				padding: 1rem;
				border-radius: 6px;
				overflow-x: auto;
			}
			pre code {
				background: none;
				padding: 0;
				font-size: 100%;
			}
			blockquote {
				margin: 1em 0;
				padding: 0.5em 1em;
				border-left: 4px solid var(--color-sep);
				color: var(--color-fg-500);
			}
			ul, ol {
				padding-left: 2em;
				margin: 1em 0;
			}
			li {
				margin: 0.5em 0;
			}
			strong {
				font-weight: 600;
			}
			em {
				font-style: italic;
			}
			s {
				text-decoration: line-through;
			}
			.mention {
				background: oklch(61.6% 0.15 299.2 / 0.2);
				color: var(--color-link);
				padding: 0.1em 0.4em;
				border-radius: 3px;
				font-size: 90%;
			}
			.emoji {
				font-style: normal;
			}
			hr {
				border: none;
				border-top: 1px solid var(--color-sep);
				margin: 2em 0;
			}
			@media (prefers-color-scheme: light) {
				:root {
					--color-fg-100: oklch(15% 0 0);
					--color-fg-300: oklch(30% 0 0);
					--color-fg-400: oklch(45% 0 0);
					--color-fg-500: oklch(55% 0 0);
					--color-bg-100: oklch(98% 0 0);
					--color-bg-200: oklch(96% 0 0);
					--color-bg-300: oklch(94% 0 0);
					--color-sep: oklch(90% 0 0);
					--color-link: oklch(51.6% 0.15 299.2);
					--color-link-dim: oklch(41.6% 0.15 299.2);
				}
			}
		</style>
	</head>
	<body>
		CONTENT
	</body>
</html>
